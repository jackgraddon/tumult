name: Release
on:
  push:
    tags:
      - '*'

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest, macos-latest]

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Enable Corepack
        run: corepack enable
        shell: bash

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: 'yarn'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          key: ${{ matrix.platform }}

      - name: Install dependencies
        run: corepack yarn install --no-immutable
        shell: bash

      - name: Set version from tag
        shell: bash
        run: |
          VERSION="${{ github.ref_name }}"
          node -e "
            const fs = require('fs');
            const path = 'src-tauri/tauri.conf.json';
            const config = JSON.parse(fs.readFileSync(path, 'utf8'));
            config.version = '${VERSION}'; 
            fs.writeFileSync(path, JSON.stringify(config, null, 2));
          "

      - name: Build and Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "App Release ${{ github.ref_name }}"
          releaseBody: "Automated Windows and MacOS build."
          releaseDraft: true
          prerelease: true
          beforeBuildCommand: "sync && sleep 15"
          tauriScript: corepack yarn tauri
          args: --verbose

      - name: Generate and Merge Update Metadata
        shell: bash
        run: |
          VERSION="${{ github.ref_name }}"
          # Normalize version by removing 'v' prefix for filename matching
          RAW_VERSION=$(echo $VERSION | sed 's/^v//')
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          
          node -e "
            const fs = require('fs');
            const path = require('path');
            
            const platform = '${{ matrix.platform }}' === 'macos-latest' ? 'darwin-aarch64' : 'windows-x86_64';
            const sigPath = '${{ matrix.platform }}' === 'macos-latest' 
              ? 'src-tauri/target/release/bundle/macos/Tumult.app.tar.gz.sig'
              : 'src-tauri/target/release/bundle/msi/Tumult_' + '$RAW_VERSION' + '_x64_en-US.msi.sig';
            
            const updateDir = 'app/public';
            const updateFile = path.join(updateDir, 'update.json');

            if (fs.existsSync(sigPath)) {
              const signature = fs.readFileSync(sigPath, 'utf8').trim();
              
              if (!fs.existsSync(updateDir)) fs.mkdirSync(updateDir, { recursive: true });

              // 1. Load existing data if it exists to prevent overwriting other platforms
              let data = { version: '$VERSION', notes: 'Release $VERSION', pub_date: '$DATE', platforms: {} };
              if (fs.existsSync(updateFile)) {
                try {
                  const existing = JSON.parse(fs.readFileSync(updateFile, 'utf8'));
                  // Keep existing platforms from the other runner
                  data.platforms = existing.platforms;
                } catch (e) {
                  console.log('Starting new update.json');
                }
              }

              // 2. Add current platform data
              data.platforms[platform] = {
                signature: signature,
                url: 'https://github.com/${{ github.repository }}/releases/download/' + '$VERSION' + '/' + 
                     (platform.includes('darwin') ? 'Tumult.app.tar.gz' : 'Tumult_' + '$RAW_VERSION' + '_x64_en-US.msi')
              };

              fs.writeFileSync(updateFile, JSON.stringify(data, null, 2));
              console.log('Updated ' + platform + ' in update.json');
            }
          "

      - name: Commit and Push update.json
        # Only run this if we are on a tag push
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 1. Add the file generated in the previous step
          git add app/public/update.json
          
          # 2. Attempt to commit and push with a retry loop to handle Mac/Win race conditions
          for i in {1..5}; do
            # If there's nothing to commit (e.g. other runner already pushed this version), skip
            git commit -m "chore: update metadata for ${{ matrix.platform }} [skip ci]" || break
            
            # Pull with rebase to get the other platform's changes before pushing
            if git pull --rebase origin main && git push origin HEAD:main; then
              echo "Successfully pushed update.json"
              break
            else
              echo "Conflict detected or push failed, retrying in a few seconds... ($i/5)"
              sleep $(( (RANDOM % 10) + 5 ))
            fi
          done