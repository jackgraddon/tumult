name: Release
on:
  push:
    tags:
      - '*'

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest, macos-latest]

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Enable Corepack
        run: corepack enable
        shell: bash

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 25

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          key: ${{ matrix.platform }}

      - name: Install dependencies
        run: corepack yarn install --no-immutable
        shell: bash

      - name: Set version from tag
        shell: bash
        run: |
          VERSION="${{ github.ref_name }}"
          node -e "
            const fs = require('fs');
            const path = 'src-tauri/tauri.conf.json';
            const config = JSON.parse(fs.readFileSync(path, 'utf8'));
            config.version = '${VERSION}'; 
            fs.writeFileSync(path, JSON.stringify(config, null, 2));
          "

      - name: Build and Release
        shell: bash
        env:
          # Map all secrets to temporary environment variables
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          NUXT_PUBLIC_MATRIX_BASE_URL: 'matrix.jackg.cc'
          # Add any others here (e.g., APPLE_CERTIFICATE, APPLE_PASSWORD, etc.)
        run: |
          echo "TAURI_SIGNING_PRIVATE_KEY_PASSWORD=$TAURI_SIGNING_PRIVATE_KEY_PASSWORD" > .env
          echo "TAURI_SIGNING_PRIVATE_KEY=$TAURI_SIGNING_PRIVATE_KEY" >> .env
          echo "NUXT_PUBLIC_MATRIX_BASE_URL=$NUXT_PUBLIC_MATRIX_BASE_URL" >> .env

          corepack yarn tauri build --verbose

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/macos/*.tar.gz
            src-tauri/target/release/bundle/macos/*.tar.gz.sig
            src-tauri/target/release/bundle/msi/*.msi.sig
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and Push update.json
        # Only run this if we are on a tag push
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          VERSION="${{ github.ref_name }}"
          RAW_VERSION=$(echo $VERSION | sed 's/^v//')
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          PLATFORM='${{ matrix.platform }}'
          
          # Attempt to commit and push with a retry loop to handle Mac/Win race conditions
          for i in {1..10}; do
            # 1. Pull with rebase to ensure we have the latest update.json from the other platform
            git fetch origin main
            git rebase origin/main || (git rebase --abort && git pull --rebase origin main)
            
            # 2. Generate/Merge the update.json content
            node -e "
              const fs = require('fs');
              const path = require('path');
              
              const platformLabel = '$PLATFORM' === 'macos-latest' ? 'darwin-aarch64' : 'windows-x86_64';
              
              // Windows artifacts may vary by version in the filename
              let sigPath = '$PLATFORM' === 'macos-latest' 
                ? 'src-tauri/target/release/bundle/macos/Tumult.app.tar.gz.sig'
                : 'src-tauri/target/release/bundle/msi/Tumult_' + '$RAW_VERSION' + '_x64_en-US.msi.sig';

              // Fallback for Windows if filename differs
              if ('$PLATFORM' === 'windows-latest' && !fs.existsSync(sigPath)) {
                 const msiDir = 'src-tauri/target/release/bundle/msi';
                 if (fs.existsSync(msiDir)) {
                    const files = fs.readdirSync(msiDir);
                    const sigFile = files.find(f => f.endsWith('.msi.sig'));
                    if (sigFile) sigPath = path.join(msiDir, sigFile);
                 }
              }
              
              const updateDir = 'app/public';
              const updateFile = path.join(updateDir, 'update.json');

              if (fs.existsSync(sigPath)) {
                const signature = fs.readFileSync(sigPath, 'utf8').trim();
                if (!fs.existsSync(updateDir)) fs.mkdirSync(updateDir, { recursive: true });

                let data = { version: '$VERSION', notes: 'Release $VERSION', pub_date: '$DATE', platforms: {} };
                if (fs.existsSync(updateFile)) {
                  try {
                    const existing = JSON.parse(fs.readFileSync(updateFile, 'utf8'));
                    // If the existing file is for the SAME version, merge platforms. 
                    // Otherwise, start fresh for the new version.
                    if (existing.version === '$VERSION') {
                       data.platforms = existing.platforms;
                    }
                  } catch (e) { console.log('Starting new update.json'); }
                }

                data.platforms[platformLabel] = {
                  signature: signature,
                  url: 'https://github.com/${{ github.repository }}/releases/download/' + '$VERSION' + '/' + 
                       (platformLabel.includes('darwin') ? 'Tumult.app.tar.gz' : path.basename(sigPath).replace('.sig', ''))
                };

                fs.writeFileSync(updateFile, JSON.stringify(data, null, 2));
                console.log('Updated ' + platformLabel + ' in update.json');
              } else {
                console.error('Signature file not found: ' + sigPath);
                process.exit(1);
              }
            "
            
            # 3. Commit and Push
            git add app/public/update.json
            if git commit -m "chore: update metadata for $PLATFORM [skip ci]"; then
              if git push origin HEAD:main; then
                echo "Successfully pushed update.json"
                break
              fi
            else
              echo "Nothing to commit for $PLATFORM (possibly already updated)"
              # Check if push is needed even if no new commit (maybe rebase brought in changes)
              git push origin HEAD:main && break || true
            fi

            echo "Conflict detected or push failed, retrying in a few seconds... ($i/10)"
            sleep $(( (RANDOM % 15) + 10 ))
          done
