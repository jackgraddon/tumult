name: Release
on:
  push:
    tags:
      - '*'

jobs:
  # ─── Job 1: Build on each platform ───────────────────────────────────────────
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest, macos-latest]

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Enable Corepack
        run: corepack enable
        shell: bash

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 25

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          key: ${{ matrix.platform }}

      - name: Install dependencies
        run: corepack yarn install --no-immutable
        shell: bash

      # Tags are formatted as "0.3.23-1" — no v prefix, already valid semver.
      # Write it directly into tauri.conf.json.
      - name: Set version from tag
        shell: bash
        run: |
          VERSION="${{ github.ref_name }}"
          node -e "
            const fs = require('fs');
            const path = 'src-tauri/tauri.conf.json';
            const config = JSON.parse(fs.readFileSync(path, 'utf8'));
            config.version = '${VERSION}';
            fs.writeFileSync(path, JSON.stringify(config, null, 2));
            console.log('Set tauri version to: ${VERSION}');
          "

      - name: Build
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          NUXT_PUBLIC_MATRIX_BASE_URL: 'matrix.jackg.cc'
        run: |
          echo "TAURI_SIGNING_PRIVATE_KEY_PASSWORD=$TAURI_SIGNING_PRIVATE_KEY_PASSWORD" > .env
          echo "TAURI_SIGNING_PRIVATE_KEY=$TAURI_SIGNING_PRIVATE_KEY" >> .env
          echo "NUXT_PUBLIC_MATRIX_BASE_URL=$NUXT_PUBLIC_MATRIX_BASE_URL" >> .env
          corepack yarn tauri build --verbose

      - name: Upload release assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/macos/*.tar.gz
            src-tauri/target/release/bundle/macos/*.tar.gz.sig
            src-tauri/target/release/bundle/msi/*.msi.sig
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Upload .sig files as Actions artifacts so the update_json job can
      # download both platforms' sigs at once with no race condition.
      - name: Upload .sig files as Actions artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sig-${{ matrix.platform }}
          # Glob both possible locations; only one will match per platform
          path: |
            src-tauri/target/release/bundle/macos/*.tar.gz.sig
            src-tauri/target/release/bundle/msi/*.msi.sig
          if-no-files-found: error

  # ─── Job 2: Generate update.json after BOTH platforms have finished ──────────
  update_json:
    needs: build          # Waits for the full build matrix to complete
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main       # Always work off main, not the tag commit

      - name: Download macOS .sig
        uses: actions/download-artifact@v4
        with:
          name: sig-macos-latest
          path: sigs/mac

      - name: Download Windows .sig
        uses: actions/download-artifact@v4
        with:
          name: sig-windows-latest
          path: sigs/win

      - name: Generate update.json
        shell: bash
        run: |
          VERSION="${{ github.ref_name }}"
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          REPO="${{ github.repository }}"

          # The upload-artifact action preserves subdirectory structure relative
          # to the least common ancestor, so the .sig files may be nested inside
          # sigs/mac/macos/ or sigs/win/msi/ rather than directly in sigs/mac/.
          # Use find to locate them regardless of nesting depth.
          MAC_SIG_PATH=$(find sigs/mac -name "*.tar.gz.sig" | head -n 1)
          WIN_SIG_PATH=$(find sigs/win -name "*.msi.sig"    | head -n 1)

          echo "macOS sig: $MAC_SIG_PATH"
          echo "Windows sig: $WIN_SIG_PATH"

          if [ -z "$MAC_SIG_PATH" ]; then echo "ERROR: macOS .sig not found"; exit 1; fi
          if [ -z "$WIN_SIG_PATH" ]; then echo "ERROR: Windows .sig not found"; exit 1; fi

          node -e "
            const fs   = require('fs');
            const path = require('path');

            const version    = '$VERSION';
            const date       = '$DATE';
            const repo       = '$REPO';
            const macSigPath = '$MAC_SIG_PATH';
            const winSigPath = '$WIN_SIG_PATH';

            const macSig = fs.readFileSync(macSigPath, 'utf8').trim();
            const winSig = fs.readFileSync(winSigPath, 'utf8').trim();

            // ── Build download URLs ──────────────────────────────────────────
            const base     = 'https://github.com/' + repo + '/releases/download/' + version + '/';
            const macAsset = 'Tumult.app.tar.gz';
            // Strip .sig to get the real installer filename (e.g. Tumult_0.3.23-2_x64_en-US.msi)
            const winAsset = path.basename(winSigPath).replace('.sig', '');

            // ── Write update.json ────────────────────────────────────────────
            const data = {
              version,
              notes:    'Release ' + version,
              pub_date: date,
              platforms: {
                'darwin-aarch64': { signature: macSig, url: base + macAsset },
                'darwin-x86_64':  { signature: macSig, url: base + macAsset },
                'windows-x86_64': { signature: winSig, url: base + winAsset },
              }
            };

            fs.mkdirSync('app/public', { recursive: true });
            fs.writeFileSync('app/public/update.json', JSON.stringify(data, null, 2));
            console.log('update.json written for version ' + version);
            console.log('  macOS asset  : ' + macAsset);
            console.log('  Windows asset: ' + winAsset);
          "

      - name: Commit and push update.json
        shell: bash
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add app/public/update.json
          # Only commit if the file actually changed
          if git diff --cached --quiet; then
            echo "update.json unchanged, nothing to commit."
          else
            git commit -m "chore: update.json for ${{ github.ref_name }} [skip ci]"
            git push origin HEAD:main
            echo "update.json pushed to main."
          fi
